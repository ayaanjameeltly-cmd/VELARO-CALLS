{% extends 'base.html' %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-lg font-medium">Templates</h1>
</div>

<div class="flex gap-2 mb-4 flex-wrap">
  <a href="/templates" class="text-xs px-3 py-1.5 rounded-lg border {{ 'bg-gray-900 text-white border-gray-900' if not cat else 'border-gray-200 text-gray-600 hover:bg-gray-50' }}">All</a>
  {% for c in cats %}
  <a href="/templates?cat={{ c }}" class="text-xs px-3 py-1.5 rounded-lg border {{ 'bg-gray-900 text-white border-gray-900' if cat==c else 'border-gray-200 text-gray-600 hover:bg-gray-50' }}">{{ c }}</a>
  {% endfor %}
</div>

<div class="space-y-3 mb-8">
{% for t in templates %}
<div class="bg-white rounded-xl border border-gray-100 p-4">
  <div class="flex items-start justify-between gap-4 mb-2">
    <div class="flex items-center gap-2">
      <span class="font-medium text-sm">{{ t['name'] }}</span>
      <span class="mono text-xs text-gray-400">{{ t['category'] }}</span>
      {% if t['niche'] != 'all' %}<span class="text-xs px-1.5 py-0.5 rounded-full niche-{{ t['niche'] }}">{{ t['niche'] }}</span>{% endif %}
    </div>
    <button onclick="copy({{ t['content']|tojson }}, this)" class="text-xs px-3 py-1 border border-gray-200 rounded-lg hover:bg-gray-50 flex-shrink-0">Copy</button>
  </div>
  <pre class="text-xs text-gray-600 whitespace-pre-wrap font-sans leading-relaxed bg-gray-50 rounded-lg p-3 max-h-40 overflow-y-auto">{{ t['content'] }}</pre>
</div>
{% endfor %}
</div>

<div class="bg-white rounded-xl border border-gray-100 p-4">
  <div class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-3">Add template</div>
  <form method="post" action="/templates/add" class="space-y-3">
    <div class="grid grid-cols-3 gap-3">
      <div>
        <label class="text-xs text-gray-400 block mb-0.5">Name</label>
        <input type="text" name="name" required class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:border-blue-400">
      </div>
      <div>
        <label class="text-xs text-gray-400 block mb-0.5">Category</label>
        <select name="category" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none">
          {% for c in cats %}<option>{{ c }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-400 block mb-0.5">Niche</label>
        <select name="niche" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none">
          <option value="all">all</option><option value="law">law</option>
        </select>
      </div>
    </div>
    <div>
      <label class="text-xs text-gray-400 block mb-0.5">Content</label>
      <textarea name="content" rows="4" required class="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none resize-none"></textarea>
    </div>
    <button type="submit" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-xs font-medium hover:bg-gray-700">Add Template</button>
  </form>
</div>
{% endblock %}
