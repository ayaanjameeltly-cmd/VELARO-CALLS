[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 4 calling sessions per day (IST times converted to UTC)
# 9:30 PM IST  = 16:00 UTC
# 11:30 PM IST = 18:00 UTC
# 1:30 AM IST  = 20:00 UTC
# 3:30 AM IST  = 22:00 UTC
[[crons]]
schedule = "0 16 * * *"
command  = "python vapi_caller.py"

[[crons]]
schedule = "0 18 * * *"
command  = "python vapi_caller.py"

[[crons]]
schedule = "0 20 * * *"
command  = "python vapi_caller.py"

[[crons]]
schedule = "0 22 * * *"
command  = "python vapi_caller.py"
